<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Báo giá BH</title>
<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f7fb;
}

.header {
    background: #2d89ef;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    border: none;
    font-weight: bold;
}

.btn-primary {
    background: #2d89ef;
    color: white;
}

.btn-copy {
    background: #27ae60;
    color: white;
}

.result {
    margin-top: 10px;
    font-weight: bold;
    color: #2d89ef;
}

.history {
    font-size: 14px;
    margin-top: 10px;
    border-top: 1px solid #eee;
    padding-top: 10px;
}

.history-item {
    margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="header">BÁO GIÁ BẢO HIỂM</div>

<div class="container">

<div class="card">

<select id="loaiXe">
<option value="khongkd">Không KD</option>
<option value="kdvt">KDVT</option>
</select>

<input type="number" id="giaTri" placeholder="Giá trị xe (triệu)">

<select id="tuoiXe">
<option value="0"><3 năm</option>
<option value="1">3-6 năm</option>
<option value="2">6-10 năm</option>
<option value="3">10-15 năm</option>
</select>

<input type="number" id="hoaHong" value="23" placeholder="% Hoa hồng">

<button class="btn-primary" onclick="tinh()">TÍNH PHÍ</button>
<button class="btn-copy" onclick="copy()">COPY</button>

<div class="result" id="ketqua"></div>

</div>

<div class="card">
<b>Lịch sử báo giá</b>
<div id="history"></div>
<button onclick="clearHistory()">Xóa lịch sử</button>
</div>

</div>

<script>
const data = {
    khongkd: {
        "<400":[1.485,1.62,1.845,2.115],
        "400-500":[1.395,1.503,1.755,2.025],
        "500-600":[1.26,1.35,1.755,2.025],
        "600-700":[1.143,1.215,1.485,1.71],
        "700-800":[1.125,1.215,1.485,1.71],
        ">800":[0.99,1.098,1.26,1.575]
    },
    kdvt: {
        "<400":[1.845,2.025,2.43,2.925],
        "400-500":[1.755,1.935,2.205,2.7],
        "500-600":[1.665,1.8,2.205,2.7],
        "600-700":[1.62,1.755,2.07,2.52],
        "700-800":[1.575,1.71,2.07,2.52],
        ">800":[1.395,1.575,1.845,2.295]
    }
};

function getRange(v){
    if(v<400) return "<400";
    if(v<500) return "400-500";
    if(v<600) return "500-600";
    if(v<700) return "600-700";
    if(v<800) return "700-800";
    return ">800";
}

function f(n){
    return Math.round(n).toLocaleString('en-US');
}

let kq = "";

function tinh(){
    let v = parseFloat(giaTri.value);
    let type = loaiXe.value;
    let age = tuoiXe.value;
    let hh = parseFloat(hoaHong.value);
    let giaTri = giaTri.value;

    if(!v || hh<0 || hh>100){
        alert("Nhập sai!");
        return;
    }

    let range = getRange(v);
    let rate = data[type][range][age];

    let fee = v * 1000000 * rate / 100;
    let hhTien = (fee / 1.1) * hh / 100;
    let thuVe = fee - hhTien;

kq = 
`Phí bảo hiểm: ${f(fee)} VNĐ
Hoa hồng: ${f(hhTien)} VNĐ
Thu về: ${f(thuVe)} VNĐ`;
    ketqua.innerText = kq;

    saveHistory(kq);
}

function copy(){
    if(!kq){ alert("Chưa có dữ liệu"); return; }
    navigator.clipboard.writeText(kq);
    alert("Đã copy");
}

function saveHistory(text){
    let list = JSON.parse(localStorage.getItem("history") || "[]");
    list.unshift(text);
    localStorage.setItem("history", JSON.stringify(list));
    loadHistory();
}

function loadHistory(){
    let list = JSON.parse(localStorage.getItem("history") || "[]");
    history.innerHTML = list.map(i => `<div class="history-item">${i}</div>`).join("");
}

function clearHistory(){
    localStorage.removeItem("history");
    loadHistory();
}

loadHistory();

// PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
